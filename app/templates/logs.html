{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">System Logs</h2>
<div class="table-responsive">
  <table class="table table-dark table-sm align-middle">
    <thead><tr><th>Time</th><th>Type</th><th>Level</th><th>Message</th><th>Payload</th></tr></thead>
    <tbody>
    {% for log in logs %}
      <tr>
        <td>{{ log.created_at|ist }}</td><td>{{ log.event_type }}</td><td>{{ log.level }}</td>
        <td>{{ log.message }}</td><td><code>{{ log.payload }}</code></td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
