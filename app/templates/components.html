{% macro page_header(title, badge=None, badge_class="text-bg-secondary") -%}
<div class="page-header"><h2>{{ title }}</h2>{% if badge %}<span class="badge {{ badge_class }}">{{ badge }}</span>{% endif %}</div>
{%- endmacro %}

{% macro empty_state(message) -%}
<div class="empty-state">{{ message }}</div>
{%- endmacro %}
